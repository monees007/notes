<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My PDF Library</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfobject/2.3.0/pdfobject.min.js"></script>
    <script src="files.js"></script>

    <style>
        /* Body stretches to fill the viewport */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #525659;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 320px;
            min-width: 320px; /* Prevents sidebar from shrinking */
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
            z-index: 10;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #1a252f;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            position: sticky;
            top: 0;
        }

        /* Subject (Folder) Styling */
        .subject-header {
            padding: 12px 20px;
            background-color: #34495e;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 1px solid #2c3e50;
            user-select: none;
            display: flex;
            justify-content: space-between;
        }
        
        .subject-header:hover { background-color: #3b536b; }
        .subject-header::after { content: '▼'; font-size: 0.8em; }
        .subject-header.collapsed::after { content: '▶'; }

        /* File List Styling */
        .file-list {
            display: block;
            background-color: #2c3e50;
        }
        
        .file-list.collapsed { display: none; }

        .file-item {
            padding: 10px 20px 10px 40px; /* Indented to show hierarchy */
            cursor: pointer;
            font-size: 0.95em;
            border-bottom: 1px solid #34495e;
            transition: background 0.2s;
        }

        .file-item:hover { background-color: #3b536b; }
        .file-item.active {
            background-color: #3498db;
            color: #ffffff;
            border-left: 4px solid #ecf0f1;
            padding-left: 36px; /* Adjust padding to account for the border */
        }

        /* PDF Viewer Container */
        #pdf-viewer {
            flex-grow: 1; /* Stretches to fill remaining space */
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .pdfobject-container { height: 100%; width: 100%; border: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Library</div>
        <div id="sidebar-content"></div>
    </div>

    <div id="pdf-viewer">
        <p>Select a file from the sidebar to view it.</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sidebarContent = document.getElementById("sidebar-content");
            let firstFileLoaded = false;
            
            // pdfData comes from files.js
            for (const [subject, files] of Object.entries(pdfData)) {
                
                // 1. Create Subject Header
                const subjectDiv = document.createElement("div");
                subjectDiv.className = "subject-header";
                subjectDiv.textContent = subject;
                
                // 2. Create container for files inside this subject
                const fileListDiv = document.createElement("div");
                fileListDiv.className = "file-list";
                
                // Toggle accordion on click
                subjectDiv.addEventListener("click", () => {
                    subjectDiv.classList.toggle("collapsed");
                    fileListDiv.classList.toggle("collapsed");
                });

                // 3. Add files to the subject container
                files.forEach(fileName => {
                    const item = document.createElement("div");
                    item.className = "file-item";
                    item.textContent = fileName.replace(/\.pdf$/i, "");
                    
                    item.addEventListener("click", () => {
                        // Remove active class from all files
                        document.querySelectorAll(".file-item").forEach(el => el.classList.remove("active"));
                        item.classList.add("active");
                        
                        // Construct the correct path: files/Subject/Filename.pdf
                        const filePath = `files/${subject}/${fileName}`;
                        
                        if(PDFObject.supportsPDFs){
                            PDFObject.embed(filePath, "#pdf-viewer");
                        } else {
                            document.getElementById("pdf-viewer").innerHTML = 
                                `<div style="text-align: center;">
                                    <p>Your browser doesn't support inline PDFs.</p>
                                    <a href="${filePath}" target="_blank" style="color: #3498db;">Download ${fileName}</a>
                                </div>`;
                        }
                    });
                    
                    fileListDiv.appendChild(item);
                    
                    // Auto-load the very first file found in the loops
                    if (!firstFileLoaded) {
                        item.click();
                        firstFileLoaded = true;
                    }
                });

                sidebarContent.appendChild(subjectDiv);
                sidebarContent.appendChild(fileListDiv);
            }
        });
    </script>
</body>
</html>
